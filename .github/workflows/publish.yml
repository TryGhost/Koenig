name: Publish

on:
  push:
    branches:
      - main
    paths:
      - 'packages/*/package.json'
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Preview what would be published without actually publishing'
        required: false
        type: boolean
        default: true

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    # Run for lerna version commits or manual dispatch
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.head_commit.message, 'Published new versions')

    permissions:
      id-token: write    # OIDC token for npm trusted publishers
      contents: read

    env:
      FORCE_COLOR: 1
      NODE_OPTIONS: '--max_old_space_size=8192'
      CI: true
      IS_SHIPPING: true
      VITE_SENTRY_AUTH_TOKEN: ${{ secrets.VITE_SENTRY_AUTH_TOKEN }}
      NPM_CONFIG_PROVENANCE: true

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: yarn --frozen-lockfile --prefer-offline

      - name: Verify root lockfile is in sync
        run: git diff --exit-code -- yarn.lock

      - name: Build all packages
        run: lerna run build

      - name: Publish to npm (dry run)
        if: github.event.inputs['dry-run'] == 'true'
        run: yarn ship:ci
        env:
          NPM_CONFIG_DRY_RUN: true

      - name: Publish to npm
        if: github.event.inputs['dry-run'] != 'true'
        run: yarn ship:ci

      - uses: tryghost/actions/actions/slack-build@b1a1e8c9d7aecf04d10a8634134dd59549876f3e # main
        if: failure()
        with:
          status: ${{ job.status }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
